services:
  - type: web
    name: resq-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TOKEN_HOURS
        value: "24"
      - key: STAFF_SETUP_KEY
        sync: false
